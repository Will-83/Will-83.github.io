<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ham Status Updater</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
        }
        h2 { margin-top: 0; color: #ffffff; text-align: center; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; font-size: 0.9rem; }
        select, input, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #333;
            background-color: #2a2a2a;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
        }
        select:focus, input:focus { border-color: #4caf50; outline: none; }
        button {
            background-color: #4caf50;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }
        button:hover { background-color: #45a049; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        #status-msg { text-align: center; margin-top: 15px; font-weight: bold; }
        .hidden { display: none; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>📡 Status Updater</h2>
    
    <label for="github-token">GitHub Personal Access Token</label>
    <input type="password" id="github-token" placeholder="Paste classic token here...">
    <button id="save-token-btn" onclick="saveToken()">Save Token</button>

    <div id="controls-section" class="hidden">
        <label for="status">Status</label>
        <select id="status">
            <option value="ON THE AIR">🟢 ON THE AIR</option>
            <option value="MONITORING">🟡 MONITORING</option>
            <option value="BUSY">🔴 BUSY</option>
            <option value="OFF AIR">⚫ OFF AIR</option>
        </select>

        <label for="mode">Mode</label>
        <select id="mode">
            <option value="DMR">DMR</option>
            <option value="YSF">YSF</option>
            <option value="FM">FM</option>
            <option value="FT8">FT8</option>
            <option value="CW">CW</option>
            <option value="SSB">SSB</option>
            <option value="NXDN">NXDN</option>
        </select>

        <label for="details">Talkgroup / Frequency / Note</label>
        <input type="text" id="details" placeholder="e.g., 31259 Missouri or 14.300 MHz">

        <button id="update-btn" onclick="generateAndUpload()">Update Status Image</button>
    </div>

    <div id="status-msg"></div>
</div>

<canvas id="statusCanvas" width="400" height="220"></canvas>

<script>
    const REPO = "Will-83/Will-83.github.io"; // Adjust if your repo/username matches differently
    const FILE_PATH = "status.png";

    // Load saved token on startup
    window.onload = function() {
        const savedToken = localStorage.getItem('gh_status_token');
        if (savedToken) {
            document.getElementById('github-token').value = savedToken;
            document.getElementById('controls-section').classList.remove('hidden');
            document.getElementById('save-token-btn').innerText = "Update Saved Token";
        }
    }

    function saveToken() {
        const token = document.getElementById('github-token').value.trim();
        if (token) {
            localStorage.setItem('gh_status_token', token);
            document.getElementById('controls-section').classList.remove('hidden');
            document.getElementById('save-token-btn').innerText = "Update Saved Token";
            showMsg("Token saved securely to browser storage!", "#4caf50");
        }
    }

    function showMsg(text, color) {
        const msgDiv = document.getElementById('status-msg');
        msgDiv.innerText = text;
        msgDiv.style.color = color;
    }

    async function generateAndUpload() {
        const token = localStorage.getItem('gh_status_token');
        if (!token) return showMsg("Missing GitHub Token!", "red");

        const updateBtn = document.getElementById('update-btn');
        updateBtn.disabled = true;
        showMsg("Generating image...", "#e0e0e0");

        const status = document.getElementById('status').value;
        const mode = document.getElementById('mode').value;
        const details = document.getElementById('details').value.trim();

        // 1. Draw to Canvas
        const canvas = document.getElementById('statusCanvas');
        const ctx = canvas.getContext('2d');

        // Dark background
        ctx.fillStyle = "#1a1a1a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#333333";
        ctx.strokeRect(1, 1, canvas.width - 2, canvas.height - 2);

        // Status Indicator Dot Color
        let dotColor = "#888888";
        if (status === "ON THE AIR") dotColor = "#00ff00";
        if (status === "MONITORING") dotColor = "#ffcc00";
        if (status === "BUSY") dotColor = "#ff3333";

        // Draw Indicator Dot
        ctx.beginPath();
        ctx.arc(30, 35, 8, 0, 2 * Math.PI);
        ctx.fillStyle = dotColor;
        ctx.fill();

        // Status Text
        ctx.font = "bold 16px sans-serif";
        ctx.fillStyle = "#ffffff";
        ctx.fillText(status, 50, 40);

        // Divider Line
        ctx.strokeStyle = "#444444";
        ctx.beginPath();
        ctx.moveTo(20, 60);
        ctx.lineTo(380, 60);
        ctx.stroke();

        // Details Texts
        ctx.font = "14px sans-serif";
        ctx.fillStyle = "#aaaaaa";
        
        ctx.fillText("Mode:", 25, 95);
        ctx.fillStyle = "#ffffff";
        ctx.fillText(mode, 80, 95);

        if (details) {
            ctx.fillStyle = "#aaaaaa";
            ctx.fillText("Details:", 25, 130);
            ctx.fillStyle = "#ffffff";
            ctx.fillText(details, 80, 130);
        }

        // Timestamp
        const now = new Date();
        const timeString = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + " " + now.toLocaleDateString([], {month:'short', day:'numeric'});
        ctx.font = "italic 12px sans-serif";
        ctx.fillStyle = "#666666";
        ctx.fillText("Updated: " + timeString, 25, 190);

        // Convert canvas to blob data
        canvas.toBlob(async function(blob) {
            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = async function() {
                const base64Data = reader.result.split(',')[1];
                
                showMsg("Contacting GitHub...", "#e0e0e0");
                
                // Get current file SHA if it exists to overwrite it
                let sha = "";
                const url = `https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`;
                
                try {
                    const getRes = await fetch(url, {
                        headers: { "Authorization": `token ${token}` }
                    });
                    if (getRes.status === 200) {
                        const data = await getRes.json();
                        sha = data.sha;
                    }

                    // Push image data to GitHub
                    const putBody = {
                        message: "Status Image Update via Web App",
                        content: base64Data,
                        branch: "main"
                    };
                    if (sha) putBody.sha = sha;

                    const putRes = await fetch(url, {
                        method: "PUT",
                        headers: {
                            "Authorization": `token ${token}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(putBody)
                    });

                    if (putRes.status === 200 || putRes.status === 201) {
                        showMsg("Success! Status image updated live.", "#4caf50");
                    } else {
                        const errData = await putRes.json();
                        showMsg("Upload Error: " + errData.message, "red");
                    }
                } catch (err) {
                    showMsg("Network error trying to contact GitHub.", "red");
                } finally {
                    updateBtn.disabled = false;
                }
            };
        }, 'image/png');
    }
</script>

</body>
</html>
